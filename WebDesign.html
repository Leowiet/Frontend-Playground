<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Design Tailwind</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="p-10 bg-gray-50">

    <nav class="mt-5 max-w-6xl mx-auto flex justify-between p-3  w-full bg-white shadow-xl rounded-lg ">
        <div class="font-bold text-3xl">
            Logo
        </div>

        <div class="flex ">
            <ul class="flex items-center gap-5 ">
                <li class="hover:text-grass transition-all duration-300 ease-in-out"><a href="">AI Agents</a></li>
                <li class="hover:text-grass transition-all duration-300 ease-in-out"><a href="">Industries</a></li>
                <li class="hover:text-grass transition-all duration-300 ease-in-out"><a href="">Pricing Resources</a></li>
                <li class="hover:text-grass transition-all duration-300 ease-in-out"><a href="">About</a></li>
            </ul>

            <div class="mx-5 ">
                <button class="bg-black text-white w-25 h-10 rounded-lg hover:bg-grass transition-all duration-300 ease-in-out"><p>Sign Up</p></button>
                <button class="mx-2 bg-white border-2 w-25 h-10 rounded-lg hover:border-grass hover:text-grass transition-all duration-300 ease-in-out"><p>Log In</p></button>
            </div>
        </div>
        
    </nav>

    <section class="mt-30 max-w-6xl mx-auto ">
           <div class="flex justify-between items-center" >
            <div>
             <h1 class="font-bold text-3xl">Make Your Brand</h1>
             <h1 class="font-bold text-3xl">Discoverable</h1>
             <h1 class="font-bold text-5xl">Everywhere</h1>

             <p class="mt-10 text-lg">Qvery's AI Agents help marketers measure and <br> grow brand visibility on the web</p>

             <button class="bg-black text-white hover:bg-grass transition-all duration-300 ease-in-out w-25 h-10 rounded-lg mt-3 ">Get a Demo </button>
             <button class="w-25 h-15 mx-3 hover:text-grass transition-all duration-300 ease-in-out">Login ></button>
            </div>
            <div>
                <p class=" flex justify-center shadow-xl w-100 h-100 text-gray-900/70 text-bold items-center rounded-lg">Image Holder</p>
            </div>
           </div> 
    </section>
</body>
</html>
